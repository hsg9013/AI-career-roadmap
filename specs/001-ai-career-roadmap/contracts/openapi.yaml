openapi: 3.1.0
info:
  title: AI Career Roadmap & Portfolio Service API
  version: 0.1.0
  description: |
    P1·P2 핵심 흐름을 1차 범위로 정의한 OpenAPI 계약. P3·P4(미션·파트너·결제)는 별도 모듈로 분리하며 본 문서에 골격만 포함한다.
    인증: Bearer JWT(액세스 토큰, 15분). Refresh는 `POST /auth/refresh`로 회전.
    모든 응답은 `application/json; charset=utf-8`. 시간은 ISO-8601(UTC).
servers:
  - url: https://p16.sumzip.com/api/v1
    description: production (nginx single-domain routing)
  - url: http://localhost:9536/v1
    description: local backend dev


security:
  - bearerAuth: []

tags:
  - name: auth
  - name: students
  - name: activities
  - name: gap-diagnosis
  - name: roadmap
  - name: documents
  - name: missions
  - name: mentor
  - name: notifications
  - name: payments
  - name: partners-univ
  - name: partners-enterprise
  - name: mobile
  - name: seniors
  - name: admin

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT 액세스 토큰. 페이로드는 `sub`(user_id), `role`(student/mentor/university/enterprise/admin),
        `scope`(공백 구분 — 예: "university:aggregate university:individual") 클레임을 포함한다.
        엔드포인트별 필요 scope는 각 operation의 security 항목에 명시. 미들웨어 `scopeGuard`가 강제한다.

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string, example: VALIDATION_ERROR }
        message: { type: string }
        details: { type: object }

    Pagination:
      type: object
      properties:
        page: { type: integer, minimum: 1 }
        page_size: { type: integer, minimum: 1, maximum: 100 }
        total: { type: integer, minimum: 0 }

    StudentProfile:
      type: object
      required: [id, user_id, university, major, year_in_school]
      properties:
        id: { type: integer, format: int64 }
        user_id: { type: integer, format: int64 }
        university: { type: string }
        major: { type: string }
        year_in_school: { type: integer, minimum: 1, maximum: 6 }
        expected_grad_at: { type: string, format: date, nullable: true }
        school_email_verified: { type: boolean }

    TargetJob:
      type: object
      required: [id, industry_code, job_role_code, priority]
      properties:
        id: { type: integer, format: int64 }
        industry_code: { type: string }
        job_role_code: { type: string }
        priority: { type: integer, minimum: 1, maximum: 3 }

    Activity:
      type: object
      required: [id, category, title, started_at]
      properties:
        id: { type: integer, format: int64 }
        category:
          type: string
          enum: [course, project, club, volunteer, contest, external, internship, award, certification]
        title: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        started_at: { type: string, format: date }
        ended_at: { type: string, format: date, nullable: true }
        outcome: { type: string, nullable: true }
        tags:
          type: array
          items:
            type: object
            properties:
              tag: { type: string }
              source: { type: string, enum: [auto, user] }
              weight: { type: number, nullable: true }

    ActivityInput:
      type: object
      required: [category, title, started_at]
      properties:
        category:
          type: string
          enum: [course, project, club, volunteer, contest, external, internship, award, certification]
        title: { type: string, maxLength: 200 }
        description: { type: string, nullable: true }
        started_at: { type: string, format: date }
        ended_at: { type: string, format: date, nullable: true }
        outcome: { type: string, nullable: true }
        manual_tags:
          type: array
          items: { type: string }

    GapDiagnosis:
      type: object
      required: [id, target_job_id, computed_at, overall_score, payload]
      properties:
        id: { type: integer, format: int64 }
        target_job_id: { type: integer, format: int64 }
        computed_at: { type: string, format: date-time }
        overall_score: { type: number, minimum: 0, maximum: 100 }
        payload:
          type: object
          properties:
            fulfilled: { type: array, items: { type: string } }
            missing:   { type: array, items: { type: string } }
            priority_to_improve: { type: array, items: { type: string } }
        model_version: { type: string }

    RoadmapItem:
      type: object
      required: [id, recommend_type, title, recommend_term, priority_rank, status]
      properties:
        id: { type: integer, format: int64 }
        recommend_type:
          type: string
          enum: [certification, contest, external, internship, project, course]
        title: { type: string }
        recommend_term:
          type: string
          enum: ['3-1','3-2','4-1','4-2','vacation','any']
        priority_rank: { type: integer }
        status: { type: string, enum: [pending, in_progress, done, skipped] }
        rationale:
          type: object
          nullable: true
          properties:
            matched_senior_count: { type: integer }
            match_score: { type: number, minimum: 0, maximum: 1 }
            sample_confidence: { type: number, minimum: 0, maximum: 1 }
            notes: { type: string, nullable: true }

    Roadmap:
      type: object
      required: [id, target_job_id, generated_at, items]
      properties:
        id: { type: integer, format: int64 }
        target_job_id: { type: integer, format: int64 }
        generated_at: { type: string, format: date-time }
        model_version: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/RoadmapItem' }

    GeneratedDocument:
      type: object
      required: [id, doc_type, template_code, created_at]
      properties:
        id: { type: integer, format: int64 }
        doc_type: { type: string, enum: [resume, cover_letter, portfolio] }
        template_code: { type: string }
        target_job_id: { type: integer, format: int64, nullable: true }
        file_url: { type: string, nullable: true }
        content: { type: object }
        created_at: { type: string, format: date-time }

    DocumentShareLink:
      type: object
      required: [token, expires_at]
      properties:
        token: { type: string }
        expires_at: { type: string, format: date-time }
        view_limit: { type: integer, nullable: true }

paths:
  /auth/register/student:
    post:
      tags: [auth]
      summary: 학생 회원가입 (이메일·비밀번호)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, university, major, year_in_school]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                university: { type: string }
                major: { type: string }
                year_in_school: { type: integer, minimum: 1, maximum: 6 }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id: { type: integer }
                  email_verification_sent: { type: boolean }

  /auth/login:
    post:
      tags: [auth]
      summary: 이메일·비밀번호 로그인 (JWT 발급)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: 로그인 성공 (refresh는 HttpOnly 쿠키로 별도 설정)
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  expires_in: { type: integer, description: 초 }
                  role: { type: string }

  /auth/refresh:
    post:
      tags: [auth]
      summary: refresh 토큰으로 access 재발급 (refresh 회전)
      security: []
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  expires_in: { type: integer }

  /auth/logout:
    post:
      tags: [auth]
      summary: refresh 토큰 무효화
      responses:
        '204': { description: no content }

  /auth/oauth/{provider}/callback:
    get:
      tags: [auth]
      security: []
      parameters:
        - in: path
          name: provider
          required: true
          schema: { type: string, enum: [google, naver] }
        - in: query
          name: code
          required: true
          schema: { type: string }
      responses:
        '302': { description: 클라이언트 URL로 리다이렉트 + 쿠키 설정 }

  /students/me:
    get:
      tags: [students]
      summary: 내 학생 프로필 조회
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StudentProfile' }
    patch:
      tags: [students]
      summary: 내 학생 프로필 업데이트
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university: { type: string }
                major: { type: string }
                year_in_school: { type: integer, minimum: 1, maximum: 6 }
                expected_grad_at: { type: string, format: date, nullable: true }
      responses:
        '200':
          description: updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StudentProfile' }

  /students/me/target-jobs:
    get:
      tags: [students]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/TargetJob' }
    put:
      tags: [students]
      summary: 목표 직무 일괄 갱신 (최대 3개)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              maxItems: 3
              items:
                type: object
                required: [industry_code, job_role_code, priority]
                properties:
                  industry_code: { type: string }
                  job_role_code: { type: string }
                  priority: { type: integer, minimum: 1, maximum: 3 }
      responses:
        '200': { description: ok }

  /activities:
    get:
      tags: [activities]
      summary: 내 활동 목록 조회
      parameters:
        - in: query
          name: category
          schema:
            type: string
            enum: [course, project, club, volunteer, contest, external, internship, award, certification]
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination: { $ref: '#/components/schemas/Pagination' }
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Activity' }
    post:
      tags: [activities]
      summary: 활동 등록
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActivityInput' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }

  /activities/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    patch:
      tags: [activities]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ActivityInput' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Activity' }
    delete:
      tags: [activities]
      responses:
        '204': { description: deleted }

  /gap-diagnosis:
    post:
      tags: [gap-diagnosis]
      summary: 갭 진단 계산 트리거
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_job_id]
              properties:
                target_job_id: { type: integer, format: int64 }
      responses:
        '200':
          description: 진단 결과
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GapDiagnosis' }
        '422':
          description: 필수 프로필 누락
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /gap-diagnosis/latest:
    get:
      tags: [gap-diagnosis]
      parameters:
        - in: query
          name: target_job_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 최신 진단 결과
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GapDiagnosis' }
        '404': { description: 진단 이력 없음 }

  /roadmap:
    get:
      tags: [roadmap]
      summary: 활성 로드맵 조회
      parameters:
        - in: query
          name: target_job_id
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Roadmap' }
    post:
      tags: [roadmap]
      summary: 로드맵 (재)생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_job_id]
              properties:
                target_job_id: { type: integer, format: int64 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Roadmap' }

  /roadmap/items/{id}/status:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    put:
      tags: [roadmap]
      summary: 로드맵 항목 상태 변경 (완료·진행·건너뜀)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, in_progress, done, skipped]
                feedback_reason:
                  type: string
                  nullable: true
                  description: skipped/reject 시 사유 (FR-014 거부 학습)
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema: { $ref: '#/components/schemas/RoadmapItem' }

  /documents:
    get:
      tags: [documents]
      parameters:
        - in: query
          name: doc_type
          schema: { type: string, enum: [resume, cover_letter, portfolio] }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/GeneratedDocument' }
    post:
      tags: [documents]
      summary: 문서 자동 생성
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [doc_type, template_code]
              properties:
                doc_type: { type: string, enum: [resume, cover_letter, portfolio] }
                template_code: { type: string }
                target_job_id: { type: integer, format: int64, nullable: true }
                cover_letter_prompts:
                  type: array
                  items: { type: string }
                  description: cover_letter 항목별 키워드
      responses:
        '201':
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GeneratedDocument' }

  /documents/{id}/export:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer, format: int64 }
    post:
      tags: [documents]
      summary: 내보내기 (PDF 또는 공유 링크)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [format]
              properties:
                format: { type: string, enum: [pdf, share_link] }
                expires_in_hours: { type: integer, minimum: 1, maximum: 720, default: 168 }
                view_limit: { type: integer, nullable: true }
      responses:
        '200':
          description: 내보내기 결과
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      pdf_url: { type: string }
                  - $ref: '#/components/schemas/DocumentShareLink'

  /notifications/preferences:
    get:
      tags: [notifications]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  email_enabled: { type: boolean }
                  inapp_enabled: { type: boolean }
                  digest_frequency: { type: string, enum: [daily, weekly, per_event] }
    put:
      tags: [notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email_enabled: { type: boolean }
                inapp_enabled: { type: boolean }
                digest_frequency: { type: string, enum: [daily, weekly, per_event] }
      responses:
        '200': { description: ok }

  /notifications/inbox:
    get:
      tags: [notifications]
      parameters:
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: page_size
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  pagination: { $ref: '#/components/schemas/Pagination' }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        template_code: { type: string }
                        payload: { type: object }
                        sent_at: { type: string, format: date-time, nullable: true }

  /missions:
    get:
      tags: [missions]
      summary: 미션 목록 (학생용; P3)
      parameters:
        - in: query
          name: industry_code
          schema: { type: string }
        - in: query
          name: job_role_code
          schema: { type: string }
      responses:
        '200': { description: ok }

  /missions/{id}/submit:
    post:
      tags: [missions]
      summary: 미션 제출 (P3)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                notes: { type: string }
      responses:
        '202': { description: 제출 큐 적재 + AI 1차 분석 시작 }

  /payments/checkout:
    post:
      tags: [payments]
      summary: 결제 시작 (P4 — PortOne)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [plan_code]
              properties:
                plan_code: { type: string }
                pay_method: { type: string }
      responses:
        '200':
          description: 결제 페이지 또는 PortOne 토큰
          content:
            application/json:
              schema:
                type: object
                properties:
                  imp_uid: { type: string }
                  merchant_uid: { type: string }
                  amount_krw: { type: integer }

  /payments/webhook/portone:
    post:
      tags: [payments]
      security: []
      summary: PortOne 결제 결과 웹훅 (멱등 처리)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200': { description: ok }

  /partners/universities/dashboard/aggregate:
    get:
      tags: [partners-univ]
      summary: 대학 관리자 — 집계 통계 (R-7, scope=university:aggregate)
      description: |
        학과·학년·코호트 단위의 집계 통계만 반환한다. 셀별 인원 수가 k=5 미만이면
        해당 셀은 자동 마스킹된다. 학생 개인 식별 정보는 절대 포함하지 않는다.
        scope=university:aggregate 권한이 있으면 학생측 차등 동의 여부와 무관하게 조회 가능.
      security:
        - bearerAuth: [university:aggregate]
      parameters:
        - in: query
          name: department
          schema: { type: string }
        - in: query
          name: year_in_school
          schema: { type: integer }
        - in: query
          name: cohort_year
          schema: { type: integer, description: "예: 2024 (입학년도)" }
      responses:
        '200':
          description: 집계 통계 (k-익명성 자동 적용)
          content:
            application/json:
              schema:
                type: object
                properties:
                  generated_at: { type: string, format: date-time }
                  rows:
                    type: array
                    items:
                      type: object
                      properties:
                        bucket: { type: string, description: "예: 경영학과/3학년" }
                        student_count: { type: integer, description: "k<5는 null로 마스킹" }
                        avg_roadmap_completion: { type: number, format: float, nullable: true }
                        avg_gap_score: { type: number, format: float, nullable: true }
                        avg_active_days_30d: { type: number, format: float, nullable: true }
        '403': { description: scope 부족 }

  /partners/universities/students/{studentId}/progress:
    get:
      tags: [partners-univ]
      summary: 대학 관리자 — 개인 단위 진척도 (R-7, scope=university:individual + 학생 동의 필요)
      description: |
        다음 3개 조건을 모두 만족할 때만 200을 반환한다 — (1) 호출자 JWT가
        scope=university:individual 보유, (2) students.university_consent_scope='individual',
        (3) students.university_id = admin.university_id. 응답 시 audit_logs에
        action='university_view_individual' 강제 적재.
      security:
        - bearerAuth: [university:individual]
      parameters:
        - in: path
          name: studentId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: 학생 개인 단위 진척도
          content:
            application/json:
              schema:
                type: object
                properties:
                  student_id: { type: integer, format: int64 }
                  name: { type: string }
                  major: { type: string }
                  year_in_school: { type: integer }
                  roadmap_completion: { type: number, format: float }
                  recent_activities: { type: array, items: { type: object } }
                  generated_at: { type: string, format: date-time }
        '403': { description: scope 부족 또는 대학 ID 불일치 또는 학생 동의 없음 }
        '404': { description: 학생 미존재 }

  /students/me/university-consent:
    patch:
      tags: [students]
      summary: 대학 측 진척도 노출 범위 토글 (R-7 차등 동의)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [scope]
              properties:
                scope:
                  type: string
                  enum: [none, aggregate_only, individual]
                  description: |
                    none = 대학에 어떤 데이터도 제공 안 함
                    aggregate_only = 집계 통계에만 포함(개인 식별 불가)
                    individual = 개인 단위 조회까지 허용
      responses:
        '200': { description: 동의 범위 변경 완료. consent_records에 새 행 추가됨 }

  /mentor/me/track:
    get:
      tags: [mentor]
      summary: 멘토 현재 트랙 및 변경 가능 시점 조회 (R-8)
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  mentor_track: { type: string, enum: [fixed, commission] }
                  track_changed_at: { type: string, format: date-time, nullable: true }
                  next_change_eligible_at: { type: string, format: date-time, description: "분기당 1회 쿨다운" }
    patch:
      tags: [mentor]
      summary: 멘토 트랙 변경 (R-8, 90일 쿨다운 적용)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to_track]
              properties:
                to_track: { type: string, enum: [fixed, commission] }
                reason: { type: string, maxLength: 200 }
      responses:
        '200': { description: 변경 완료 (mentor_track_history 적재) }
        '409': { description: 쿨다운 미경과 (next_change_eligible_at 포함) }

  /mentor/me/payment-method:
    put:
      tags: [mentor]
      summary: 멘토 정산 계좌·사업자 정보 등록·갱신 (R-8)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bank_code, account_no, account_holder]
              properties:
                bank_code: { type: string, maxLength: 10 }
                account_no: { type: string }
                account_holder: { type: string, maxLength: 60 }
                business_no: { type: string, nullable: true, description: "개인사업자만" }
                is_business: { type: boolean }
      responses:
        '200': { description: 저장 완료. 1원 인증 트리거됨 (verified_at은 별도 확인 후 갱신) }

  /mentor/me/payouts:
    get:
      tags: [mentor]
      summary: 멘토 월 정산 내역 조회 (R-8)
      parameters:
        - in: query
          name: year
          schema: { type: integer }
        - in: query
          name: month
          schema: { type: integer, minimum: 1, maximum: 12 }
      responses:
        '200':
          description: 정산 내역
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    period_year: { type: integer }
                    period_month: { type: integer }
                    track: { type: string, enum: [fixed, commission] }
                    gross_krw: { type: integer }
                    withholding_krw: { type: integer }
                    net_krw: { type: integer }
                    status: { type: string, enum: [pending, approved, paid, failed] }
                    paid_at: { type: string, format: date-time, nullable: true }

  /devices/push-tokens:
    post:
      tags: [mobile]
      summary: 모바일 디바이스 푸시 토큰 등록 (R-6)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, device_token]
              properties:
                platform: { type: string, enum: [ios, android, web] }
                device_token: { type: string, maxLength: 500 }
                app_version: { type: string, nullable: true }
                os_version: { type: string, nullable: true }
      responses:
        '201': { description: 토큰 등록. 기존 (platform, device_token)이 타 사용자에 매핑돼 있으면 그쪽을 비활성화. }

  /devices/push-tokens/{tokenId}:
    delete:
      tags: [mobile]
      summary: 푸시 토큰 비활성화 (로그아웃·앱 삭제 시) (R-6)
      parameters:
        - in: path
          name: tokenId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '204': { description: deactivated }

  /partners/enterprises/job-postings:
    post:
      tags: [partners-enterprise]
      summary: 기업 직무 등록 (P4)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, industry_code, job_role_code, open_at, close_at]
              properties:
                title: { type: string }
                industry_code: { type: string }
                job_role_code: { type: string }
                open_at: { type: string, format: date }
                close_at: { type: string, format: date }
                description: { type: string }
      responses:
        '201': { description: created }

  /partners/enterprises/contact-requests:
    post:
      tags: [partners-enterprise]
      summary: 익명 학생에 컨택 요청
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_handle, job_posting_id, message]
              properties:
                student_handle: { type: string, description: 매칭 결과의 익명 핸들 }
                job_posting_id: { type: integer, format: int64 }
                message: { type: string, maxLength: 1000 }
      responses:
        '202': { description: 학생에게 알림 발송 }

  /admin/moderation-queue:
    get:
      tags: [admin]
      summary: 운영자 검수 큐 조회
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [pending, approved, rejected] }
      responses:
        '200': { description: ok }

  # ----- Phase 13 (2026-05-22 /speckit.analyze 후속 보강) -----

  /students/me/data-export:
    post:
      tags: [students]
      summary: 학생 개인정보 일괄 내보내기 요청 (FR-004)
      description: 비동기 잡 enqueue. 완료 시 이메일로 7일 유효 다운로드 URL 발송.
      responses:
        '202':
          description: accepted
          content:
            application/json:
              schema:
                type: object
                properties:
                  request_id: { type: integer, format: int64 }
                  status: { type: string, enum: [pending, processing, ready, expired] }

  /students/me/data-export/{requestId}:
    get:
      tags: [students]
      summary: 내보내기 요청 상태·다운로드 URL 조회 (FR-004)
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [pending, processing, ready, expired] }
                  download_url: { type: string, nullable: true }
                  expires_at: { type: string, format: date-time, nullable: true }

  /students/me/account-deletion:
    post:
      tags: [students]
      summary: 학생 탈퇴 요청 — 30일 유예 시작 (FR-004)
      responses:
        '202': { description: accepted, scheduled for 30-day grace period }
    delete:
      tags: [students]
      summary: 탈퇴 요청 취소 (유예 기간 내)
      responses:
        '204': { description: canceled }

  /students/me/consents:
    get:
      tags: [students]
      summary: 동의 5종 현재 상태 + 시점 이력 (FR-031)
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        code: { type: string, enum: [service_use, university_share, enterprise_share, anonymous_dataset, marketing] }
                        granted: { type: boolean }
                        scope: { type: string, nullable: true, description: "university_share 전용: none/aggregate_only/individual" }
                        last_changed_at: { type: string, format: date-time }
    patch:
      tags: [students]
      summary: 동의 5종 부분 갱신 (FR-031)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                university_share: { type: string, enum: [none, aggregate_only, individual], nullable: true }
                enterprise_share: { type: boolean, nullable: true }
                anonymous_dataset: { type: boolean, nullable: true }
                marketing: { type: boolean, nullable: true }
      responses:
        '200': { description: 부분 갱신 완료. 각 항목마다 consent_records에 새 행 적재 }

  /students/me/reports:
    get:
      tags: [students]
      summary: 학생 정기 리포트 목록 (FR-026/028)
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: integer, format: int64 }
                    period_kind: { type: string, enum: [quarterly, semester_end, year_end] }
                    period_end: { type: string, format: date }
                    sent_at: { type: string, format: date-time, nullable: true }

  /students/me/reports/{reportId}:
    get:
      tags: [students]
      summary: 정기 리포트 상세 (FR-028)
      parameters:
        - in: path
          name: reportId
          required: true
          schema: { type: integer, format: int64 }
      responses:
        '200': { description: 리포트 페이로드 }

  /partners/enterprises/placements:
    post:
      tags: [partners-enterprise]
      summary: 채용 성사 신고 (FR-040 — 학생·기업 양측 보고)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [student_id, enterprise_id, start_date, contract_kind]
              properties:
                student_id: { type: integer, format: int64 }
                enterprise_id: { type: integer, format: int64 }
                job_posting_id: { type: integer, format: int64, nullable: true }
                start_date: { type: string, format: date }
                salary_krw: { type: integer, nullable: true }
                contract_kind: { type: string, enum: [full_time, internship, contract] }
      responses:
        '201':
          description: 보고 접수. 양측 컨펌 시 자동 확정 + enterprise_billings draft 생성
          content:
            application/json:
              schema:
                type: object
                properties:
                  placement_id: { type: integer, format: int64 }
                  status: { type: string, enum: [pending, confirmed, canceled] }

  /partners/enterprises/placements/{placementId}/cancel:
    post:
      tags: [partners-enterprise]
      summary: 채용 성사 취소·환급 (90일 내, 운영자 검수)
      parameters:
        - in: path
          name: placementId
          required: true
          schema: { type: integer, format: int64 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        '202': { description: 운영자 검수 대기 }

  /partners/enterprises/billings:
    get:
      tags: [partners-enterprise]
      summary: 기업 청구서 목록 (FR-040)
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [draft, issued, paid, refunded] }
      responses:
        '200': { description: ok }

  /senior/contributions/me/rewards:
    get:
      tags: [seniors]
      summary: 선배 기부자 인센티브 내역·뱃지 (FR-046)
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  cash_total_krw: { type: integer }
                  credit_balance: { type: integer }
                  badges:
                    type: array
                    items: { type: string, description: "예: bronze, silver, gold, platinum" }
                  ledger:
                    type: array
                    items:
                      type: object
                      properties:
                        kind: { type: string, enum: [cash, credit, badge] }
                        amount_krw: { type: integer, nullable: true }
                        credit_units: { type: integer, nullable: true }
                        badge_code: { type: string, nullable: true }
                        reason: { type: string }
                        accrued_at: { type: string, format: date-time }
                        settled_at: { type: string, format: date-time, nullable: true }

  /admin/kpi:
    get:
      tags: [admin]
      summary: 운영자용 SC-001~SC-020 KPI 대시보드 데이터 (C5)
      parameters:
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    sc_code: { type: string, description: "SC-001..SC-020" }
                    ratio_pct: { type: number, format: float }
                    numerator: { type: integer }
                    denominator: { type: integer }
                    snapshot_date: { type: string, format: date }

  /healthz:
    get:
      tags: [admin]
      security: []
      summary: 헬스 체크 (Liveness)
      responses:
        '200': { description: healthy }

  /readyz:
    get:
      tags: [admin]
      security: []
      summary: 의존성 확인 (Readiness) — DB·Redis·MinIO·외부 LLM
      responses:
        '200': { description: ready }
        '503': { description: 의존성 일부 사용 불가 }
