openapi: 3.0.3
info:
  title: AI 진로·취업 로드맵 플랫폼 API
  version: 0.1.0
  description: >
    intent-specify.md 기반 전체 P1~P4 플랫폼 API 계약. 9개 User Story / 25개 FR 매핑.
servers:
  - url: https://p16.sumzip.com/api/v1
    description: production
  - url: http://localhost:9536/v1
    description: local
security:
  - bearerAuth: []
tags:
  - { name: auth }
  - { name: students }
  - { name: diagnosis, description: "P1 역량 갭 진단" }
  - { name: roadmap, description: "P2 로드맵 추천" }
  - { name: documents, description: "P2 문서 자동화" }
  - { name: missions, description: "P3 미션·피드백" }
  - { name: notifications, description: "P3 알림" }
  - { name: university, description: "P3 대학(B2G)" }
  - { name: companies, description: "P4 기업 매칭(B2B)" }
  - { name: payments, description: "P4 결제·정산" }
  - { name: alumni, description: "P4 선배 데이터 기부" }

paths:
  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: 로그인 (FR-001)
      responses: { '200': { description: 토큰 발급 } }

  /students/me/profile:
    put:
      tags: [students]
      summary: 프로필 입력/수정 (FR-003)
      responses: { '200': { description: 저장됨 } }

  /diagnosis:
    post:
      tags: [diagnosis]
      summary: 역량 갭 진단 실행 (FR-004 / US1)
      description: 누락 항목 시 422로 보완 안내
      responses:
        '200': { description: 진단 결과(충족/부족 역량 시각화 데이터) }
        '422': { description: 진단 필요 항목 누락 }

  /roadmap:
    post:
      tags: [roadmap]
      summary: 합격 로드맵 생성 (FR-005 / US2)
      description: k-익명성(≥5) 미달 코호트는 폴백 일반 추천 + 안내
      responses: { '200': { description: 시기별 추천 활동 목록 } }
  /roadmap/items/{itemId}/reject:
    post:
      tags: [roadmap]
      summary: 추천 거부 (FR-006)
      parameters: [{ name: itemId, in: path, required: true, schema: { type: string } }]
      responses: { '204': { description: 거부 이력 기록 } }

  /documents:
    post:
      tags: [documents]
      summary: 이력서/자소서/포트폴리오 생성 (FR-008~009 / US3)
      responses: { '201': { description: 문서 초안 생성 } }
  /documents/{docId}:
    put:
      tags: [documents]
      summary: 문서 수정·버전 저장 (FR-009)
      parameters: [{ name: docId, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: 최신본 저장 } }

  /missions/{missionId}/submissions:
    post:
      tags: [missions]
      summary: 미션 제출 → AI 1차 피드백 (FR-010~011 / US4)
      parameters: [{ name: missionId, in: path, required: true, schema: { type: string } }]
      responses: { '201': { description: 제출 접수 + AI 피드백 } }
  /submissions/{submissionId}/feedback:
    get:
      tags: [missions]
      summary: 결합 피드백 조회(AI+현직자) (FR-011~012)
      parameters: [{ name: submissionId, in: path, required: true, schema: { type: string } }]
      responses: { '200': { description: 피드백(기한초과 시 재배정/AI 대체 상태 포함) } }

  /notifications:
    get:
      tags: [notifications]
      summary: 알림 조회 (FR-013 / US5)
      responses: { '200': { description: 진척 점검·업데이트 알림 목록 } }

  /university/students:
    get:
      tags: [university]
      summary: 대학 학생 현황 조회 (FR-014 / US6)
      description: 동의 범위(stats/individual)에 따라 서버가 차등 응답
      responses: { '200': { description: 동의 범위 내 통계 또는 개인 단위 현황 } }

  /companies/candidates:
    get:
      tags: [companies]
      summary: 기업 인재 검색 (FR-015 / US7)
      description: 매칭 미동의 학생은 결과 제외
      responses: { '200': { description: 요건 부합 후보 목록 } }

  /payments/checkout:
    post:
      tags: [payments]
      summary: 멤버십/단건 결제 (FR-016 / US8)
      responses:
        '200': { description: 결제 확인 → 권한 활성화 }
        '402': { description: 결제 실패(권한 미활성, 사유 안내) }
  /payments/mentor-payouts:
    get:
      tags: [payments]
      summary: 멘토 정산 내역 (FR-017)
      responses: { '200': { description: 정액/수수료 정산 내역 } }

  /alumni/paths:
    post:
      tags: [alumni]
      summary: 선배 합격 경로 기부 (FR-018~019 / US9)
      description: 제출 즉시 익명화 저장 후 보상 지급
      responses: { '201': { description: 익명화 저장 + 보상 지급 } }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
