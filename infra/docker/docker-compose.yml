# 프로젝트 표준 포트: backend 9536, frontend-web 9516
# 도메인: p16.sumzip.com (운영 nginx single-domain)

services:
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: pioneer16
      MARIADB_USER: pioneer16
      MARIADB_PASSWORD: pioneer26
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/initdb.d:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    container_name: backend
    restart: unless-stopped
    env_file:
      - ../../.env
    environment:
      PORT: 9536
      DB_HOST: mariadb
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "9536:9536"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9536/healthz"]
      interval: 10s
      retries: 5

  frontend-web:
    build:
      context: ../..
      dockerfile: infra/docker/frontend-web.Dockerfile
    container_name: frontend-web
    restart: unless-stopped
    ports:
      - "9516:9516"
    depends_on:
      - backend

  # 운영 nginx (단일 도메인 p16.sumzip.com 진입점)
  # 운영 배포 시에만 사용 — 로컬 개발은 vite dev + backend dev 직접 접속
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend-web

volumes:
  mariadb_data:
  minio_data:
