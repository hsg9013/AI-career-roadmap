# 운영 nginx 단일 진입점 (p16.sumzip.com)
# /api/* → backend:9536 프록시
# /     → frontend-web:9516 정적 자산 컨테이너 프록시

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 4096;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"path":"$request_uri",'
      '"status":$status,'
      '"bytes":$body_bytes_sent,'
      '"ua":"$http_user_agent",'
      '"request_time":$request_time'
    '}';
  access_log /var/log/nginx/access.log json_combined;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;

  # gzip / brotli
  gzip on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

  # rate limit zones
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

  # 보안 헤더 기본
  map $sent_http_content_type $csp_header {
    default "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://p16.sumzip.com;";
  }

  # HTTP → HTTPS 리다이렉트
  server {
    listen 80;
    server_name p16.sumzip.com;
    return 301 https://$server_name$request_uri;
  }

  # HTTPS (Let's Encrypt 또는 운영팀 인증서)
  server {
    listen 443 ssl http2;
    server_name p16.sumzip.com;

    ssl_certificate     /etc/letsencrypt/live/p16.sumzip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/p16.sumzip.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy $csp_header always;

    # API 프록시 (backend:9536)
    location /api/ {
      limit_req zone=api_general burst=40 nodelay;

      # /api/auth/* 는 더 강한 rate limit
      location ~* ^/api/(v\d+/)?auth/(login|register|refresh) {
        limit_req zone=api_auth burst=10 nodelay;
        proxy_pass http://backend:9536/;
      }

      proxy_pass http://backend:9536/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # 정적 자산 (frontend-web:9516)
    location / {
      proxy_pass http://frontend-web:9516;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
